<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري عرض الإعلان</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        body { font-family: Tahoma, sans-serif; text-align: center; padding: 40px 20px; background-color: #121212; color: white; }
        #status { margin-top: 25px; font-size: 18px; color: #ffcc00; font-weight: bold; }
        .spinner { margin: 20px auto; width: 40px; height: 40px; border: 4px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top-color: #ffcc00; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h2>جاري تحضير الفيديو الخاص بك 🎥</h2>
    <div class="spinner" id="loading-spinner"></div>
    <p id="status">جاري تشغيل الإعلان تلقائياً، يرجى الانتظار...</p>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token'); 

        const AdController = window.Adsgram.init({ blockId: "int-25346" });

        // تشغيل الإعلان تلقائياً بمجرد فتح الصفحة
        window.onload = () => {
            AdController.show().then((result) => {
                // إخفاء التحميل وإظهار رسالة النجاح
                document.getElementById('loading-spinner').style.display = 'none';
                document.getElementById('status').innerText = "✅ تمت المشاهدة! جاري تحويلك للبوت...";

                // ⚠️ مهم جداً: استبدل YOUR_BOT_USERNAME بيوزر البوت مالتك بدون @
                const botUsername = "mustafaSaveFileBot"; 
                
                const telegramLink = `https://t.me/${botUsername}?start=${token}`;
                window.location.href = telegramLink;
                
                setTimeout(() => { Telegram.WebApp.close(); }, 500);

            }).catch((result) => {
                document.getElementById('loading-spinner').style.display = 'none';
                document.getElementById('status').innerText = "❌ حدث خطأ أو قمت بإغلاق الإعلان قبل اكتماله.";
            });
        };
    </script>
</body>
</html>
