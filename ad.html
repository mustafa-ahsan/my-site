<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل الفيديو</title>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        #status { font-size: 1.5em; color: #333; font-weight: bold; margin-bottom: 20px;}
        #action-btn { 
            padding: 15px 30px; font-size: 1.2em; color: white; 
            background-color: #0088cc; border: none; border-radius: 8px; 
            cursor: pointer; display: none; /* مخفي في البداية */
        }
        #action-btn:hover { background-color: #0077b3; }
        #loading { color: #ff0050; display: none; margin-top: 15px; font-size: 1.2em;}
    </style>
</head>
<body>

    <div id="status">شاهد إعلاناً قصيراً للحصول على الفيديو</div>
    
    <button id="action-btn">مشاهدة الإعلان 📥</button>
    <div id="loading">⏳ جاري إرسال الفيديو إلى تليكرام...</div>

    <script>
        // استخراج البيانات اللي دزها البوت بالرابط
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('video');
        const chatId = urlParams.get('chat_id');
        const token = urlParams.get('token');

        const btn = document.getElementById('action-btn');
        const statusText = document.getElementById('status');
        const loadingText = document.getElementById('loading');

        // تجهيز إعلان Adsgram بالـ UnitID مالتك
        // ملاحظة: تأكد من أن الـ blockId هو 25291
        const AdController = window.Adsgram.init({ blockId: "25291" });

        // نظهر الزر للمستخدم
        btn.style.display = 'inline-block';

        btn.addEventListener('click', () => {
            // من يضغط المستخدم، نشغل الإعلان
            AdController.show().then((result) => {
                // هذي الدالة تتنفذ من يكمل المستخدم مشاهدة الإعلان للآخر (Rewarded)
                
                // نخفي الزر ونغير النص
                btn.style.display = 'none';
                statusText.textContent = "✅ شكراً لك!";
                loadingText.style.display = 'block';

                // نرسل الفيديو للمستخدم عبر تليكرام
                sendVideoToTelegram();

            }).catch((error) => {
                // إذا المستخدم سد الإعلان قبل لا يخلص، أو صار خطأ
                alert("لم تكتمل المشاهدة أو حدث خطأ. حاول مرة أخرى.");
            });
        });

        function sendVideoToTelegram() {
            if (videoUrl && chatId && token) {
                const telegramApiUrl = `https://api.telegram.org/bot${token}/sendVideo?chat_id=${chatId}&video=${encodeURIComponent(videoUrl)}`;
                
                fetch(telegramApiUrl)
                    .then(response => response.json())
                    .then(data => {
                        if(data.ok) {
                            loadingText.style.color = "green";
                            loadingText.textContent = "✅ تم الإرسال بنجاح! يمكنك إغلاق هذه الصفحة.";
                        } else {
                            loadingText.style.color = "red";
                            loadingText.textContent = "❌ حدث خطأ أثناء الإرسال.";
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        loadingText.textContent = "❌ حدث خطأ في الاتصال.";
                    });
            }
        }
    </script>

</body>
</html>
