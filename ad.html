<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري عرض الإعلانات</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: Tahoma, sans-serif; 
            text-align: center; 
            padding: 15px 10px; 
            background-color: #121212; 
            color: white; 
            margin: 0;
        }
        #status { margin-top: 10px; font-size: 16px; color: #ffcc00; font-weight: bold; }
        .spinner { margin: 5px auto 15px auto; width: 30px; height: 30px; border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top-color: #ffcc00; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* تنسيق لترتيب الإعلانات بشكل عمودي وأنيق */
        .ads-container {
            display: flex;
            flex-direction: column;
            gap: 20px; /* المسافة بين كل إعلان والثاني */
            align-items: center;
            margin-top: 20px;
            padding-bottom: 30px;
        }
        .ad-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="spinner" id="loading-spinner"></div>
    <p id="status">جاري التحقق، يرجى الانتظار (5 ثوانٍ)...</p>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token'); 

        window.onload = () => {
            // توسيع نافذة تيليجرام لتأخذ الشاشة كاملة وتتسع للإعلانات
            Telegram.WebApp.expand();

            // مؤقت 5 ثوانٍ قبل العودة للبوت
            setTimeout(() => {
                document.getElementById('loading-spinner').style.display = 'none';
                document.getElementById('status').innerText = "✅ تمت المشاهدة! جاري تحويلك...";

                const botUsername = "mustafaSaveFileBot"; 
                const telegramLink = `https://t.me/${botUsername}?start=${token}`;
                window.location.href = telegramLink;
                
                setTimeout(() => { Telegram.WebApp.close(); }, 500);
            }, 5000); 
        };
    </script>

    <div class="ads-container">
        
        <div class="ad-wrapper">
            <iframe data-aa='2430866' src='//acceptable.a-ads.com/2430866/?size=Adaptive' style='border:0; padding:0; width:90%; max-width:320px; height:70px; overflow:hidden; display:block; margin:auto; border-radius: 8px;'></iframe>
        </div>
        <div class="ad-wrapper">
            <iframe data-aa='2430882' src='//acceptable.a-ads.com/2430882/?size=Adaptive' style='border:0; padding:0; width:90%; max-width:320px; height:70px; overflow:hidden; display:block; margin:auto; border-radius: 8px;'></iframe>
        </div>
        <div class="ad-wrapper">
            <iframe data-aa='2430883' src='//acceptable.a-ads.com/2430883/?size=Adaptive' style='border:0; padding:0; width:90%; max-width:320px; height:70px; overflow:hidden; display:block; margin:auto; border-radius: 8px;'></iframe>
        </div>
        </div>

    <!-- BEGIN AADS AD UNIT 2431050 -->

<div id="frame" style="width: 100%;margin: auto;position: relative; z-index: 99998;">
          <iframe data-aa='2431050' src='//acceptable.a-ads.com/2431050/?size=Adaptive'
                            style='border:0; padding:0; width:70%; height:auto; overflow:hidden;display: block;margin: auto'></iframe>
        </div>

<!-- END AADS AD UNIT 2431050 -->

</body>
</html>
