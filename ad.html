<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاهد الإعلان للتحميل</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        body { font-family: Tahoma, sans-serif; text-align: center; padding: 40px 20px; background-color: #121212; color: white; }
        .btn { padding: 15px 30px; font-size: 18px; font-weight: bold; background-color: #0088cc; color: white; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-top: 20px;}
        .btn:active { background-color: #006699; }
        #status { margin-top: 25px; font-size: 16px; color: #ffcc00; }
    </style>
</head>
<body>
    <h2>جاري تحضير الفيديو الخاص بك 🎥</h2>
    <p>يرجى مشاهدة إعلان قصير لدعم البوت والاستمرار في تقديم الخدمة مجاناً.</p>
    
    <button id="showAdBtn" class="btn">شاهد الإعلان الآن 🎬</button>
    <p id="status"></p>

    <script>
        // استخراج آيدي المستخدم من الرابط الذي سيرسله البوت
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userid');

        // تهيئة إعلان AdsGram باستخدام الـ Block ID الخاص بك
        const AdController = window.Adsgram.init({ blockId: "int-25342" });

        document.getElementById('showAdBtn').addEventListener('click', () => {
            document.getElementById('status').innerText = "جاري تحميل الإعلان، يرجى الانتظار...";
            
            AdController.show().then((result) => {
                // إذا أكمل المستخدم مشاهدة الإعلان بنجاح
                document.getElementById('status').innerText = "✅ شكراً لك! جاري إرسال الفيديو في التيليجرام...";

                // إرسال إشارة إلى سيرفر Replit الخاص بك ليقوم بإرسال الفيديو
                // ⚠️ مهم جداً: استبدل الرابط أدناه برابط Replit الخاص بك
                const replitUrl = "https://اسم-مشروعك.اسم-حسابك.repl.co/adsgram_callback?userid=" + userId;
                
                fetch(replitUrl).then(() => {
                    // إغلاق الشاشة المصغرة تلقائياً والعودة للبوت
                    setTimeout(() => { Telegram.WebApp.close(); }, 2000);
                }).catch(e => {
                    document.getElementById('status').innerText = "حدث خطأ بالاتصال بالسيرفر، راسل المطور.";
                });

            }).catch((result) => {
                // إذا قام بإغلاق الإعلان قبل أن يكتمل
                document.getElementById('status').innerText = "❌ لم تكتمل مشاهدة الإعلان، لن يتم إرسال الفيديو.";
            });
        });
    </script>
</body>
</html>
