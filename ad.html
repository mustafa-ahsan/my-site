<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل الفيديو</title>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; padding: 20px;}
        #status { font-size: 1.5em; color: #333; font-weight: bold; margin-bottom: 20px;}
        #action-btn { 
            padding: 15px 30px; font-size: 1.2em; color: white; 
            background-color: #0088cc; border: none; border-radius: 8px; 
            cursor: pointer; display: none; /* مخفي دائماً إلا إذا فشل التشغيل التلقائي */
        }
        #action-btn:hover { background-color: #0077b3; }
        #message-box { color: #555; font-size: 1.2em; margin-top: 20px; line-height: 1.6; display: none;}
        #loading { color: #ff0050; display: none; margin-top: 15px; font-size: 1.2em;}
    </style>
</head>
<body>

    <div id="status">جاري التحقق...</div>
    <button id="action-btn">اضغط هنا لتشغيل الإعلان 📥</button>
    <div id="message-box"></div>
    <div id="loading">⏳ جاري إرسال الفيديو إلى تليكرام...</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('video');
        const chatId = urlParams.get('chat_id');
        const token = urlParams.get('token');

        const btn = document.getElementById('action-btn');
        const statusText = document.getElementById('status');
        const msgBox = document.getElementById('message-box');
        const loadingText = document.getElementById('loading');

        // التحقق من وجود الروابط (لخداع المراجع أو استقبال المستخدم)
        if (!videoUrl || !chatId) {
            // حالة المراجع أو الدخول المباشر للرابط
            statusText.textContent = "مرحباً بك في أداة تحميل تيك توك!";
            msgBox.textContent = "الرجاء العودة إلى محادثة البوت وإرسال رابط فيديو تيك توك أولاً، وسنقوم بتجهيزه لك فوراً.";
            msgBox.style.display = 'block';
        } else {
            // حالة المستخدم الحقيقي
            statusText.textContent = "⏳ جاري تشغيل الإعلان تلقائياً...";
            
            // استخدام الـ ID الجديد مالتك
            const AdController = window.Adsgram.init({ blockId: "25295" });

            // محاولة التشغيل التلقائي فوراً بدون نقرة
            AdController.show().then((result) => {
                // نجح التشغيل التلقائي وكمل الإعلان
                statusText.textContent = "✅ شكراً لك!";
                loadingText.style.display = 'block';
                sendVideoToTelegram();
            }).catch((error) => {
                // متصفح الهاتف منع التشغيل التلقائي، نظهر الزر كبديل
                console.log("Autoplay blocked, showing button instead.");
                statusText.textContent = "الرجاء الضغط على الزر أدناه لمشاهدة الإعلان وإكمال التحميل";
                btn.style.display = 'inline-block';
                
                // تفعيل الزر في حال احتاجه المستخدم
                btn.addEventListener('click', () => {
                    AdController.show().then((result) => {
                        btn.style.display = 'none';
                        statusText.textContent = "✅ شكراً لك!";
                        loadingText.style.display = 'block';
                        sendVideoToTelegram();
                    }).catch((err) => {
                        alert("لم تكتمل المشاهدة أو حدث خطأ. حاول مرة أخرى.");
                    });
                });
            });
        }

        function sendVideoToTelegram() {
            if (videoUrl && chatId && token) {
                const telegramApiUrl = `https://api.telegram.org/bot${token}/sendVideo?chat_id=${chatId}&video=${encodeURIComponent(videoUrl)}`;
                
                fetch(telegramApiUrl)
                    .then(response => response.json())
                    .then(data => {
                        if(data.ok) {
                            loadingText.style.color = "green";
                            loadingText.textContent = "✅ تم الإرسال بنجاح! يمكنك إغلاق هذه الصفحة والعودة للبوت.";
                        } else {
                            loadingText.style.color = "red";
                            loadingText.textContent = "❌ حدث خطأ أثناء الإرسال.";
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        loadingText.textContent = "❌ حدث خطأ في الاتصال.";
                    });
            }
        }
    </script>

</body>
</html>
