<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاهد الإعلان للتحميل</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        body { font-family: Tahoma, sans-serif; text-align: center; padding: 40px 20px; background-color: #121212; color: white; }
        .btn { padding: 15px 30px; font-size: 18px; font-weight: bold; background-color: #0088cc; color: white; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-top: 20px;}
        .btn:active { background-color: #006699; }
        #status { margin-top: 25px; font-size: 16px; color: #ffcc00; }
    </style>
</head>
<body>
    <h2>جاري تحضير الفيديو الخاص بك 🎥</h2>
    <p>يرجى مشاهدة إعلان قصير لدعم البوت والاستمرار في تقديم الخدمة مجاناً.</p>
    
    <button id="showAdBtn" class="btn">شاهد الإعلان الآن 🎬</button>
    <p id="status"></p>

    <script>
        // استلام الكود السري الخاص بالمستخدم
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token'); 

        const AdController = window.Adsgram.init({ blockId: "int-25342" });

        document.getElementById('showAdBtn').addEventListener('click', () => {
            document.getElementById('status').innerText = "جاري تحميل الإعلان، يرجى الانتظار...";
            
            AdController.show().then((result) => {
                document.getElementById('status').innerText = "✅ تمت المشاهدة! جاري تحويلك للبوت...";

                // ⚠️ مهم جداً: استبدل YOUR_BOT_USERNAME بيوزر البوت مالتك (مثال: DownloadShortsBot)
                const botUsername = "mustafaSaveFileBot"; 
                
                // إعادة المستخدم للبوت مع الكود السري ليقوم البوت بإرسال الفيديو
                const telegramLink = `https://t.me/${botUsername}?start=${token}`;
                window.location.href = telegramLink;
                
                // إغلاق النافذة
                setTimeout(() => { Telegram.WebApp.close(); }, 500);

            }).catch((result) => {
                document.getElementById('status').innerText = "❌ لم تكتمل مشاهدة الإعلان، يرجى المحاولة مرة أخرى.";
            });
        });
    </script>
</body>
</html>
